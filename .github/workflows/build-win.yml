name: Build and Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true

jobs:
  build-win:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.event.inputs.tag }}" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate sidecar manifest
        run: npm run verify:sidecars

      - name: Build desktop bundle
        run: npm run build:desktop

      - name: Build Windows installer
        run: npx electron-builder --config electron-builder.yml --win nsis --x64 --publish never

      - name: Validate updater artifacts
        shell: pwsh
        run: |
          $exeFiles = Get-ChildItem -Path dist -Filter *.exe -File
          if (-not $exeFiles) {
            throw "Missing installer executable in dist/*.exe"
          }

          if (-not (Test-Path -Path dist/latest.yml -PathType Leaf)) {
            throw "Missing update metadata file: dist/latest.yml"
          }

          $blockmapFiles = Get-ChildItem -Path dist -Filter *.blockmap -File
          if (-not $blockmapFiles) {
            throw "Missing blockmap files in dist/*.blockmap"
          }

          Write-Host "Found $($exeFiles.Count) installer(s), dist/latest.yml, and $($blockmapFiles.Count) blockmap file(s)."

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
