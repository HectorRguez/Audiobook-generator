name: Build Tauri Apps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            os: windows-latest
          - target: linux-x64
            os: ubuntu-latest
          - target: darwin-x64
            os: macos-15-intel
          - target: darwin-arm64
            os: macos-14

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            ffmpeg

      - name: Install macOS ffmpeg
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install Windows ffmpeg
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Prepare Piper runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:runtime -- --target ${{ matrix.target }}

      - name: Smoke test Piper runtime
        run: npm run smoke:runtime -- --runtime runtime/dist/${{ matrix.target }}

      - name: Generate voice demos
        if: matrix.target == 'linux-x64'
        run: npm run build:voice-demos -- --runtime runtime/dist/${{ matrix.target }} --out voice-demos

      - name: Build Tauri package
        run: npm run build:tauri

      - name: Collect release artifacts
        run: npm run collect:tauri-artifacts -- --target ${{ matrix.target }}

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiobook-generator-${{ matrix.target }}
          path: dist-upload/*
          if-no-files-found: error

      - name: Upload voice demos
        if: matrix.target == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: voice-demos
          path: voice-demos/*
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist-upload/*

  pages:
    name: GitHub Pages
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build:site

      - name: Download voice demos
        uses: actions/download-artifact@v4
        with:
          name: voice-demos
          path: dist-site/voice-demos

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
