<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audiobook Generator</title>
  <style>
    body {
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      background: #f5f2eb;
      color: #1a1a1a;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px;
      font-size: 15px;
      line-height: 1.6;
    }
    h1 {
      font-family: "Georgia", serif;
      font-size: 2em;
      font-weight: normal;
      margin-bottom: 0.2em;
    }
    h2 {
      font-size: 1em;
      font-weight: bold;
      margin-top: 2.5em;
      margin-bottom: 1em;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    a { color: #1a1a1a; }
    .item {
      display: flex;
      gap: 16px;
      margin-bottom: 2.2em;
    }
    .bullet {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      background: #1a1a1a;
      border-radius: 50%;
      margin-top: 8px;
    }
    .item-body { flex: 1; }
    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }
    .item-title { font-weight: bold; }
    .item-desc {
      margin-top: 4px;
      color: #444;
      font-size: 0.92em;
    }
    .links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .button-link {
      display: inline-block;
      border: 1px solid #1a1a1a;
      padding: 2px 8px;
      font-size: 0.85em;
      text-decoration: none;
      margin-top: 4px;
    }
    .button-link:hover {
      background: #1a1a1a;
      color: #f5f2eb;
    }
    audio {
      width: 100%;
      margin-top: 8px;
      background-color: #f5f2eb;
      color-scheme: light;
    }
    audio::-webkit-media-controls-enclosure,
    audio::-webkit-media-controls-panel {
      background-color: #f5f2eb;
    }
  </style>
</head>
<body>
  <h1>Audiobook Generator</h1>
  <p>Turn EPUB files into local audiobooks with bundled Spanish <a href="https://github.com/OHF-Voice/piper1-gpl">Piper</a> voices.</p>

  <h2>Downloads</h2>
  <div id="downloads"></div>

  <h2>Voice demos</h2>
  <div id="voices"></div>

  <script>
    async function main() {
      const data = await fetch("downloads.json", { cache: "no-store" }).then((response) => response.json());
      const downloads = document.getElementById("downloads");
      downloads.innerHTML = data.platforms.map((platform) => `
        <div class="item">
          <div class="bullet"></div>
          <div class="item-body">
            <div class="item-header">
              <span class="item-title">${platform.label}</span>
              <span>${platform.file}</span>
            </div>
            <div class="links">
              <a class="button-link" href="${platform.url}">download</a>
            </div>
          </div>
        </div>
      `).join("");

      const voices = document.getElementById("voices");
      voices.innerHTML = data.voices.map((voice) => `
        <div class="item">
          <div class="bullet"></div>
          <div class="item-body">
            <div class="item-header">
              <span class="item-title">${voice.name}</span>
              <span>${voice.id}</span>
            </div>
            <audio controls preload="metadata" src="${voice.demoUrl}"></audio>
          </div>
        </div>
      `).join("");
    }
    main().catch((error) => {
      document.body.insertAdjacentHTML("beforeend", `<p>${error.message}</p>`);
    });
  </script>
</body>
</html>
