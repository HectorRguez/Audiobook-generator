<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audiobook Generator</title>
  <style>
    body {
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      background: #f5f2eb;
      color: #1a1a1a;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px;
      font-size: 15px;
      line-height: 1.6;
    }
    h1 {
      font-family: "Georgia", serif;
      font-size: 2em;
      font-weight: normal;
      margin: 0;
    }
    h2 {
      font-size: 1em;
      font-weight: bold;
      margin-top: 2.5em;
      margin-bottom: 1em;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    a { color: #1a1a1a; }
    .site-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 0.2em;
    }
    .language-switch {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      font-size: 0.78em;
      text-transform: uppercase;
    }
    .language-switch button {
      appearance: none;
      border: 0;
      border-bottom: 1px solid transparent;
      padding: 1px 0;
      background: transparent;
      color: #666;
      font: inherit;
      cursor: pointer;
    }
    .language-switch button:hover,
    .language-switch button:focus-visible {
      color: #1a1a1a;
      border-bottom-color: #1a1a1a;
      outline: none;
    }
    .language-switch button[aria-pressed="true"] {
      color: #1a1a1a;
      border-bottom-color: #1a1a1a;
      font-weight: bold;
    }
    .item {
      display: flex;
      gap: 16px;
      margin-bottom: 2.2em;
    }
    .bullet {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      background: #1a1a1a;
      border-radius: 50%;
      margin-top: 8px;
    }
    .item-body { flex: 1; }
    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }
    .item-title { font-weight: bold; }
    .item-desc {
      margin-top: 4px;
      color: #444;
      font-size: 0.92em;
    }
    .links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .button-link {
      display: inline-block;
      border: 1px solid #1a1a1a;
      padding: 2px 8px;
      font-size: 0.85em;
      text-decoration: none;
      margin-top: 4px;
    }
    .button-link:hover {
      background: #1a1a1a;
      color: #f5f2eb;
    }
    .local-note {
      border-top: 1px solid #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
      margin: 24px 0 0;
      padding: 12px 0;
    }
    .local-note strong {
      display: block;
      margin-bottom: 2px;
    }
    .local-note p { margin: 0; }
    audio {
      width: 100%;
      margin-top: 8px;
      background-color: #f5f2eb;
      color-scheme: light;
    }
    audio::-webkit-media-controls-enclosure,
    audio::-webkit-media-controls-panel {
      background-color: #f5f2eb;
    }
    @media (max-width: 480px) {
      body { padding: 28px 18px; }
      .site-header {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1>Audiobook Generator</h1>
    <nav class="language-switch" aria-label="Language">
      <button type="button" data-language="en" lang="en" aria-pressed="true">English</button>
      <span aria-hidden="true">/</span>
      <button type="button" data-language="es" lang="es" aria-pressed="false">Español</button>
    </nav>
  </header>
  <p id="intro"></p>
  <div class="local-note">
    <strong id="local-note-title"></strong>
    <p id="local-note"></p>
  </div>

  <h2 id="downloads-heading"></h2>
  <div id="downloads"></div>

  <h2 id="voices-heading"></h2>
  <div id="voices"></div>

  <h2 id="licensing-heading"></h2>
  <p id="licensing-copy"></p>

  <script>
    const translations = {
      en: {
        pageTitle: "Audiobook Generator",
        languageLabel: "Language",
        intro: 'Turn English and Spanish EPUB files into local audiobooks with bundled <a href="https://github.com/OHF-Voice/piper1-gpl">Piper</a> voices.',
        localNoteTitle: "Private. Local. Free.",
        localNote: "The app runs on your computer and does not upload your books. It is free to use, with no account or subscription.",
        downloadsHeading: "Downloads",
        voicesHeading: "Voice demos",
        licensingHeading: "Licensing",
        licensingCopy: 'The bundled <a href="https://github.com/OHF-Voice/piper1-gpl/tree/v1.4.2">Piper 1.4.2</a> engine is GPL-3.0. Voice models have separate terms shown with each demo. Full license texts and attribution are included with every app and <a href="https://github.com/HectorRguez/Audiobook-generator/blob/main/runtime/licenses/VOICE_MODELS.md">published here</a>.',
        download: "download",
        downloadLabel: (platform) => `Download ${platform}`,
        platformDescriptions: {
          "Audiobook-Generator-windows-x64.exe": "Installer with automatic in-app updates.",
          "Audiobook-Generator-linux-x64.deb": "Debian package; install future versions manually."
        },
        voices: {
          "es_ES-sharvard-medium": { name: "Sharvard (Spanish)", usageNote: "Attribution required.", source: "model source" },
          "es_ES-davefx-medium": { name: "Davefx (Spanish)", usageNote: "No attribution required.", source: "model source" },
          "en_US-kristin-medium": { name: "Kristin (English)", usageNote: "No attribution required.", source: "model source", licenseName: "Public domain" }
        },
        error: "The download information could not be loaded."
      },
      es: {
        pageTitle: "Audiobook Generator",
        languageLabel: "Idioma",
        intro: 'Convierte archivos EPUB en español e inglés en audiolibros locales con las voces incluidas de <a href="https://github.com/OHF-Voice/piper1-gpl">Piper</a>.',
        localNoteTitle: "Privado. Local. Gratis.",
        localNote: "La aplicación funciona en tu ordenador y no sube tus libros. Es gratuita y no requiere cuenta ni suscripción.",
        downloadsHeading: "Descargas",
        voicesHeading: "Muestras de voz",
        licensingHeading: "Licencias",
        licensingCopy: 'El motor <a href="https://github.com/OHF-Voice/piper1-gpl/tree/v1.4.2">Piper 1.4.2</a> incluido usa la licencia GPL-3.0. Los modelos de voz tienen condiciones propias, indicadas junto a cada muestra. Los textos completos de las licencias y las atribuciones se incluyen con la aplicación y están <a href="https://github.com/HectorRguez/Audiobook-generator/blob/main/runtime/licenses/VOICE_MODELS.md">publicados aquí</a>.',
        download: "descargar",
        downloadLabel: (platform) => `Descargar ${platform}`,
        platformDescriptions: {
          "Audiobook-Generator-windows-x64.exe": "Instalador con actualizaciones automáticas desde la aplicación.",
          "Audiobook-Generator-linux-x64.deb": "Paquete Debian; las nuevas versiones se instalan manualmente."
        },
        voices: {
          "es_ES-sharvard-medium": { name: "Sharvard (español)", usageNote: "Requiere atribución.", source: "origen del modelo" },
          "es_ES-davefx-medium": { name: "Davefx (español)", usageNote: "No requiere atribución.", source: "origen del modelo" },
          "en_US-kristin-medium": { name: "Kristin (inglés)", usageNote: "No requiere atribución.", source: "origen del modelo", licenseName: "Dominio público" }
        },
        error: "No se pudo cargar la información de las descargas."
      }
    };

    let downloadsData;

    function getInitialLanguage() {
      try {
        const saved = localStorage.getItem("language");
        if (saved === "en" || saved === "es") return saved;
      } catch (_) {}
      return navigator.language.toLowerCase().startsWith("es") ? "es" : "en";
    }

    function render(language) {
      const copy = translations[language];
      document.documentElement.lang = language;
      document.title = copy.pageTitle;
      document.querySelector(".language-switch").setAttribute("aria-label", copy.languageLabel);
      document.querySelectorAll("[data-language]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.language === language));
      });
      document.getElementById("intro").innerHTML = copy.intro;
      document.getElementById("local-note-title").textContent = copy.localNoteTitle;
      document.getElementById("local-note").textContent = copy.localNote;
      document.getElementById("downloads-heading").textContent = copy.downloadsHeading;
      document.getElementById("voices-heading").textContent = copy.voicesHeading;
      document.getElementById("licensing-heading").textContent = copy.licensingHeading;
      document.getElementById("licensing-copy").innerHTML = copy.licensingCopy;

      if (!downloadsData) return;
      document.getElementById("downloads").innerHTML = downloadsData.platforms.map((platform) => `
        <div class="item">
          <div class="bullet"></div>
          <div class="item-body">
            <div class="item-header">
              <span class="item-title">${platform.label}</span>
              <span>${platform.file}</span>
            </div>
            <div class="item-desc">${copy.platformDescriptions[platform.file] || platform.description}</div>
            <div class="links">
              <a class="button-link" href="${platform.url}" aria-label="${copy.downloadLabel(platform.label)}">${copy.download}</a>
            </div>
          </div>
        </div>
      `).join("");

      document.getElementById("voices").innerHTML = downloadsData.voices.map((voice) => {
        const localized = copy.voices[voice.id] || {};
        return `
          <div class="item">
            <div class="bullet"></div>
            <div class="item-body">
              <div class="item-header">
                <span class="item-title">${localized.name || voice.name}</span>
                <span>${voice.id}</span>
              </div>
              <div class="item-desc">
                <a href="${voice.licenseUrl}" rel="license">${localized.licenseName || voice.licenseName}</a>
                - ${localized.usageNote || voice.usageNote}
                - <a href="${voice.sourceUrl}">${localized.source || "model source"}</a>
              </div>
              <audio controls preload="metadata" src="${voice.demoUrl}"></audio>
            </div>
          </div>
        `;
      }).join("");
    }

    async function main() {
      let language = getInitialLanguage();
      render(language);
      document.querySelectorAll("[data-language]").forEach((button) => {
        button.addEventListener("click", () => {
          language = button.dataset.language;
          try { localStorage.setItem("language", language); } catch (_) {}
          render(language);
        });
      });
      downloadsData = await fetch("downloads.json", { cache: "no-store" }).then((response) => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      });
      render(language);
    }
    main().catch((error) => {
      const copy = translations[document.documentElement.lang] || translations.en;
      document.body.insertAdjacentHTML("beforeend", `<p>${copy.error} ${error.message}</p>`);
    });
  </script>
</body>
</html>
