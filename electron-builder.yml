appId: com.hector.audiobookgenerator
productName: Audiobook Generator
asar: false
directories:
  output: dist
files:
  - dist-electron/**/*
  - renderer/out/**/*
  - renderer/public/**/*
  - package.json
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
linux:
  icon: build/icon.png
publish:
  - provider: github
    owner: HectorRguez
    repo: Audiobook-generator
    private: true
